<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>
    <title>SSH FTP</title>
    <script src="bundle/app-bundle.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="container main-start align-vertical">
    <!-- Content container (L->R) -->
    <div class="full-width full-height container align-horizontal main-start grow-1" id="content">

        <!-- Left sidebar (T->B) -->
        <div class="container align-vertical main-start" id="sidebar-container" expanded>
            <!-- Sessions container -->
            <div class="container align-vertical main-start cross-center" id="side-container"></div>
        </div>
        <div class="resize-horizontal border-right"></div>

        <!-- content container (T->B) -->
        <!-- Inner content must be generated in JavaScript -->
        <div class="container align-vertical main-start grow-1 nowrap" id="inner-content"></div>
    </div>
    <!-- Status bar -->
    <div class="container align-horizontal bg-primary border-top main-space-between cross-center fit-v-content" id="status-bar">
        <div class="container align-horizontal main-start cross-center full-width full-height">
            <div class="icon status-action action-more" id="sidebar-visibility-toggle"></div>
        </div>
    </div>
</body>
</html>
